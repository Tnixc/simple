<!-- Frame file for rendering individual blog post pages -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title} - My Blog</title>
  <meta name="description" content="${description}">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      line-height: 1.6;
      color: #333;
    }
    .meta {
      color: #666;
      font-size: 0.9rem;
      margin: 1rem 0;
    }

    article {
      margin-top: 2rem;
    }
    code {
      background: #f4f4f4;

      border-radius: 3px;
    }
    pre {
      background: #f4f4f4;
      padding: 1rem;
      border-radius: 5px;
      overflow-x: auto;
    }
    pre code {
      background: none;
      padding: 0;
    }
    h1, h2, h3 {
      color: #222;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: #666;
    }
/*
 * theme "Mac Classic" generated by syntect
 */

.code {
 color: #000000;
 background-color: #ffffff;
}

.comment {
 color: #0066ff;
font-style: italic;
}
.keyword, .storage {
 color: #0000ff;
font-weight: bold;
}
.constant.numeric {
 color: #0000cd;
}
.constant {
 color: #c5060b;
font-weight: bold;
}
.constant.language {
 color: #585cf6;
font-weight: bold;
}
.variable.language, .variable.other {
 color: #318495;
}
.string {
 color: #036a07;
}
.constant.character.escape, .string .source {
 color: #26b31a;
}
.meta.preprocessor {
 color: #1a921c;
}
.keyword.control.import {
 color: #0c450d;
font-weight: bold;
}
.entity.name.function, .support.function.any-method {
 color: #0000a2;
font-weight: bold;
}
.entity.name.type {
font-style: underline;
}
.entity.other.inherited-class {
font-style: italic;
}
.variable.parameter {
font-style: italic;
}
.storage.type.method {
 color: #70727e;
}
.meta.section .entity.name.section, .declaration.section .entity.name.section {
font-style: italic;
}
.support.function {
 color: #3c4c72;
font-weight: bold;
}
.support.class, .support.type {
 color: #6d79de;
font-weight: bold;
}
.support.constant {
 color: #06960e;
font-weight: bold;
}
.support.variable {
 color: #21439c;
font-weight: bold;
}
.keyword.operator.js {
 color: #687687;
}
.invalid {
 color: #ffffff;
 background-color: #990000;
}
.invalid.deprecated.trailing-whitespace {
 background-color: #ffd0d0;
}
.text .source, .string.unquoted {
 background-color: #000000;
}
.text .source .string.unquoted, .text .source .text .source {
 background-color: #000000;
}
.meta.tag.preprocessor.xml {
 color: #68685b;
}
.meta.tag.sgml.doctype, .meta.tag.sgml.doctype .entity, .meta.tag.sgml.doctype .string, .meta.tag.preprocessor.xml, .meta.tag.preprocessor.xml .entity, .meta.tag.preprocessor.xml .string {
 color: #888888;
}
.string.quoted.docinfo.doctype.DTD {
font-style: italic;
}
.meta.tag, .declaration.tag {
 color: #1c02ff;
}
.entity.name.tag {
font-weight: bold;
}
.entity.other.attribute-name {
font-style: italic;
}
.markup.heading {
 color: #0c07ff;
font-weight: bold;
}
.markup.quote {
 color: #000000;
font-style: italic;
}
.markup.list {
 color: #b90690;
}
  </style>
</head>
<body>
  <a href="/" class="back-link">← Back to all posts</a>

  <header>
    <h1>${title}</h1>
    <div class="meta">
      <span>📅 ${date}</span>
      <span>✍️ ${author}</span>
      <span>⏱️ ${readtime}</span>
    </div>
  </header>

  <article>
    ${--content}
  </article>

  <footer style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #eee; color: #666;">
    <p>Tags: ${tags}</p>
  </footer>
</body>
</html>
